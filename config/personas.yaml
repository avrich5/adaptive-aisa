      anxiety: 0.35
      trust: 0.55
      market_understanding: 0.70
      regime_awareness: 0.60
      exit_propensity: 0.20
    # Чутливість осей до ринкового контексту (DRAFT)
    anxiety_sensitivity: 0.70      # 0..1: як швидко anxiety реагує на просадку
    exit_sensitivity: 0.75         # 0..1: як швидко exit_propensity зростає
    regime_awareness_growth: 0.005 # delta/checkpoint: повільне зростання усвідомленості
    # Базові ваги дій (DRAFT; сума не обов'язково 1.0 — нормалізується в коді)
